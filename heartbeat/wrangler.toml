name = "cta-heartbeat"
main = "src/index.js"
compatibility_date = "2026-05-24"

# Single SQLite-backed Durable Object holds every job's last-seen timestamp and
# runs the staleness check via its own alarm (no separate Cron Trigger needed).
# SQLite DOs are on the free plan; KV is not usable here because the every-minute
# canaries alone exceed KV's 1000-writes/day free cap.
[[durable_objects.bindings]]
name = "HEARTBEAT"
class_name = "HeartbeatMonitor"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HeartbeatMonitor"]
